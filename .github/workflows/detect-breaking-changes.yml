name: CI
on:
  pull_request:
    branches:
      - main
      - next
  # See ci.yml: GITHUB_TOKEN-created maintenance pull requests dispatch this
  # workflow explicitly because GitHub suppresses their pull_request event.
  workflow_dispatch:
    inputs:
      base_sha:
        description: Base commit to compare with the dispatched branch
        required: true
        type: string

permissions:
  contents: read

jobs:
  detect_breaking_changes:
    runs-on: 'ubuntu-latest'
    name: detect-breaking-changes
    if: github.repository == 'openai/openai-go'
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          # Both pull requests and manual dispatches compare with a base SHA.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ./go.mod

      - name: Detect breaking changes
        env:
          BASE_SHA: ${{ inputs.base_sha || github.event.pull_request.base.sha }}
        run: |
          # Try to check out previous versions of the breaking change detection script. This ensures that
          # we still detect breaking changes when entire files and their tests are removed.
          git checkout "$BASE_SHA" -- ./scripts/detect-breaking-changes 2>/dev/null || true
          ./scripts/detect-breaking-changes "$BASE_SHA"
