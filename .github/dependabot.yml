version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      golang-x:
        patterns:
          - "golang.org/x/*"
      go-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "golang.org/x/*"

  - package-ecosystem: gomod
    directory: /examples
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      golang-x:
        patterns:
          - "golang.org/x/*"
      go-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "golang.org/x/*"
